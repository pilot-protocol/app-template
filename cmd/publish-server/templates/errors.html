<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Check your submission · Pilot</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div class="wrap narrow">
  <div class="top"><span class="brand">Pilot App Store</span><a class="brand" href="/admin">Review →</a></div>
  <h1>Almost there</h1>
  <p class="lede">The server checked your submission and found a few things to fix:</p>
  <div class="card problems">
    <h2>Fix these</h2>
    <ul>{{range .Errors}}<li class="bad" style="margin-bottom:8px">{{.}}</li>{{end}}</ul>
  </div>
  <div class="navrow">
    {{if .DraftID}}<a class="back" href="/step/identity?d={{.DraftID}}">← Back to your draft</a>{{else}}<a class="back" href="/">← Start over</a>{{end}}
    <span></span>
  </div>
</div>
</body>
</html>
