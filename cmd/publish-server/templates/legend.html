{{define "legend"}}
<ol class="stepper">
  {{range $i, $s := .Steps}}
  <li class="{{if lt $i $.CurIdx}}done{{else if eq $i $.CurIdx}}now{{end}}">
    <span class="dot">{{add $i 1}}</span><span class="lbl">{{$s.Title}}</span>
  </li>
  {{end}}
  <li class="{{if eq .CurIdx .Total}}now{{end}}">
    <span class="dot">✓</span><span class="lbl">Review</span>
  </li>
</ol>
{{end}}
