# Conservative, high-signal linter set. govet + staticcheck catch real bugs;
# the rest are cheap correctness checks. errcheck is intentionally off for now
# (the codebase has deliberate fire-and-forget writes); revisit once those are
# annotated.
run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - unconvert
    - bodyclose

issues:
  exclude-rules:
    # Generated adapter templates are validated by the scaffold tests, not here.
    - path: internal/scaffold/templates/
      linters: [staticcheck, govet, unused]
  max-issues-per-linter: 0
  max-same-issues: 0
